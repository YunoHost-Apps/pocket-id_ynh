#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "pocket-id"
name = "Pocket-ID"
description.en = "Easy-to-use OIDC provider that allows users to authenticate with their passkeys to your services"
description.fr = "Fournisseur OIDC simple qui permet aux utilisateurs de s'authentifier auprès de vos services à l'aide de leurs clés d'accès"

version = "2.7.0~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "BSD-2-Clause"
website = "https://pocket-id.org/"
demo = "https://demo.pocket-id.org/"
admindoc = "https://pocket-id.org/docs"
code = "https://github.com/pocket-id/pocket-id"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = true
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    rename = "pocket-id"
    in_subdir = false
    extract = false
    amd64.url = "https://github.com/pocket-id/pocket-id/releases/download/v2.7.0/pocket-id-linux-amd64"
    amd64.sha256 = "97e8ee3f7f7d9a0ff77851f3e796138a12e3ff5224e3ba033560e48c84df2630"
    arm64.url = "https://github.com/pocket-id/pocket-id/releases/download/v2.7.0/pocket-id-linux-arm64"
    arm64.sha256 = "9bb6270f7de0bcbab3f80d8c799b055b04066eec92dd0e551b888c6a0dc1b454"
    armhf.url = "https://github.com/pocket-id/pocket-id/releases/download/v2.7.0/pocket-id-linux-armv7"
    armhf.sha256 = "9acf86b212aacf44add844f8e12d40f47cf0d8be78885c9113b1b1e1d9094503"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^pocket-id-linux-amd64$"
    autoupdate.asset.arm64 = "^pocket-id-linux-arm64$"
    autoupdate.asset.armhf = "^pocket-id-linux-armv7$"

    [resources.system_user]
    allow_email = true

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
