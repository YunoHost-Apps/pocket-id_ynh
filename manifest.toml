#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "pocket-id"
name = "Pocket-ID"
description.en = "Easy-to-use OIDC provider that allows users to authenticate with their passkeys to your services"
description.fr = "Fournisseur OIDC simple qui permet aux utilisateurs de s'authentifier auprès de vos services à l'aide de leurs clés d'accès"

version = "2.9.0~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "BSD-2-Clause"
website = "https://pocket-id.org/"
demo = "https://demo.pocket-id.org/"
admindoc = "https://pocket-id.org/docs"
code = "https://github.com/pocket-id/pocket-id"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = true
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    rename = "pocket-id"
    in_subdir = false
    extract = false
    amd64.url = "https://github.com/pocket-id/pocket-id/releases/download/v2.9.0/pocket-id-linux-amd64"
    amd64.sha256 = "cc8e44458decc2d2f581f9d7657a593c7597e4d8d099f8f5bf6dd9d0396f2ffc"
    arm64.url = "https://github.com/pocket-id/pocket-id/releases/download/v2.9.0/pocket-id-linux-arm64"
    arm64.sha256 = "87533ea9cf0066d4d4014b7c76ce6d89048980fa07f19a5e5280f187a47268de"
    armhf.url = "https://github.com/pocket-id/pocket-id/releases/download/v2.9.0/pocket-id-linux-armv7"
    armhf.sha256 = "2f6deb9d4f8981c88a41f5b38f1f1d79ed11f6fa33439db443240159dafb4b26"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^pocket-id-linux-amd64$"
    autoupdate.asset.arm64 = "^pocket-id-linux-arm64$"
    autoupdate.asset.armhf = "^pocket-id-linux-armv7$"

    [resources.system_user]
    allow_email = true

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
